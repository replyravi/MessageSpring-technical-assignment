name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------- backend ----------------
  backend:
    name: Backend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecom
          POSTGRES_PASSWORD: ecom
          POSTGRES_DB: ecom_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecom"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ecom:ecom@localhost:5432/ecom_test?schema=public"
      JWT_SECRET: "ci-secret"
      COOKIE_SECURE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --reporters=default

      - name: Build
        run: npm run build

  # ---------------- frontend ----------------
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ---------------- docker build smoke ----------------
  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ecom-api:ci ./backend
      - name: Build frontend image
        run: docker build -t ecom-web:ci ./frontend
