name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------- backend ----------------
  backend:
    name: Backend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecom
          POSTGRES_PASSWORD: ecom
          POSTGRES_DB: ecom_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecom"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ecom:ecom@localhost:5432/ecom_test?schema=public"
      JWT_SECRET: "ci-secret"
      COOKIE_SECURE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci --reporters=default

      - name: Build
        run: npm run build

  # ---------------- frontend ----------------
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ---------------- end-to-end ----------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecom
          POSTGRES_PASSWORD: ecom
          POSTGRES_DB: ecom
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecom"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ecom:ecom@localhost:5432/ecom?schema=public"
      COOKIE_SECURE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Prepare database
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start API
        working-directory: backend
        env:
          PORT: 4000
          CORS_ORIGIN: http://localhost:3000
        run: |
          node dist/main > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null; then echo "API is up"; break; fi
            sleep 2
          done
          curl -sf http://localhost:4000/health || (echo "API failed to start"; cat /tmp/api.log; exit 1)

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright smoke test
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run e2e -- e2e/smoke.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ---------------- docker build smoke ----------------
  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ecom-api:ci ./backend
      - name: Build frontend image
        run: docker build -t ecom-web:ci ./frontend
